name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --web-renderer canvaskit
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 7

  build-image:
    name: Build & Push Docker Image
    runs-on: [self-hosted, k3s, linux, amd64]
    needs: build-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/
      - name: Build nginx image from web artifact
        run: |
          cat > Dockerfile.ci <<'DOCKERFILE'
          FROM nginx:1-alpine
          COPY build/web/ /usr/share/nginx/html/
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 80
          HEALTHCHECK --interval=30s --timeout=3s --start-period=5s \
            CMD wget -qO- http://localhost/healthz || exit 1
          DOCKERFILE
          IMAGE=harbor.k3s.internal.strommen.systems/staging/hmb
          TAG=sha-$(git rev-parse --short HEAD)
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            -t $IMAGE:$TAG \
            -t $IMAGE:latest \
            -f Dockerfile.ci \
            --push .
      - name: Deploy to k3s
        run: |
          TAG=sha-$(git rev-parse --short HEAD)
          kubectl set image deployment/hmb \
            hmb=harbor.k3s.internal.strommen.systems/staging/hmb:$TAG \
            -n hmb || true
          kubectl rollout restart deployment/hmb -n hmb || true
